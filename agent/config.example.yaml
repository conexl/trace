agent:
  name: homelytics-devbox
  interval: 10s

cloud:
  transport: none # none or http for the current agent-only demo transport
  endpoint: http://localhost:7443
  token: paste-one-time-pairing-token-here # used as pairing token before mTLS, optional after pairing
  replay_batch: 50
  replay_every: 15s
  mtls:
    ca_file: ./certs/ca.pem
    cert_file: ./certs/agent.pem
    key_file: ./certs/agent-key.pem

network:
  public_ip_url: https://api.ipify.org
  dns_checks:
    - name: main-domain
      domain: example.com
  speed_tests:
    - name: cloudflare-small
      url: https://speed.cloudflare.com/__down?bytes=1000000
      max_bytes: 1000000
      timeout: 8s
  port_checks:
    - name: local-ssh
      address: 127.0.0.1:22
      timeout: 2s
    - name: local-web
      address: 127.0.0.1:8080
      timeout: 2s

processes:
  - name: sshd
    match: sshd
    service: ssh
    critical: true
    restart: false
    remote_control: false
    max_restarts: 3
    restart_window: 5m
    restart_cooldown: 1m
  - name: nginx
    match: nginx
    service: nginx
    critical: false
    restart: false
    remote_control: true
    max_restarts: 3
    restart_window: 5m
    restart_cooldown: 1m

log_streams:
  - name: system
    path: /var/log/syslog
    max_bytes: 8192

update:
  url: ""
  sha256: ""
  signature_url: ""
  ed25519_public_key: "" # base64 raw Ed25519 public key; signature is base64 over the binary bytes

remote:
  tasks_enabled: true
  shell_enabled: false
  audit_path: ./homelytics-audit.jsonl
  poll_every: 15s

hardware:
  smart_devices: [] # empty means best-effort smartctl --scan when smartctl is installed

tasks:
  - name: disk-usage
    description: Print filesystem usage.
    command: ["df", "-h"]
    timeout: 10s
    working_dir: ""
    max_output_bytes: 65536
    env: {}

power:
  prevent_sleep: false

buffer:
  path: ./homelytics-buffer.jsonl
  max_events: 1000
  mirror_to_stdout: true

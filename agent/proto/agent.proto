syntax = "proto3";

package homelytics.agent.v1;

option go_package = "agent/proto;agentv1";

service AgentIngestService {
  rpc StreamTelemetry(stream TelemetryEnvelope) returns (StreamAck);
  rpc StreamLogs(stream LogEnvelope) returns (StreamAck);
  rpc ExecuteTask(TaskRequest) returns (TaskResult);
}

message TelemetryEnvelope {
  string agent_id = 1;
  string agent_name = 2;
  int64 collected_unix_ms = 3;
  bytes snapshot_json = 4;
}

message LogEnvelope {
  string agent_id = 1;
  string stream_name = 2;
  string path = 3;
  bytes chunk = 4;
  bool truncated = 5;
  int64 collected_unix_ms = 6;
}

message TaskRequest {
  string agent_id = 1;
  string task_name = 2;
  string request_id = 3;
}

message TaskResult {
  string request_id = 1;
  int32 exit_code = 2;
  string stdout = 3;
  string stderr = 4;
  int64 duration_ms = 5;
}

message StreamAck {
  bool accepted = 1;
  string message = 2;
}
